                </div>

  <form class="was-validated" method="post" action="/dologin">
    <div class="container" id="MainForm">
      <div class="row mb-2">
        <label class="col-form-label col-12 col-md-1" for="txt_login"> Login: </label>
        <div class="col-12 col-md-4">
          <input class="form-control" type="email" name="txt_login" id="txt_login" required />
        </div>
      </div>
      <div class="row mb-2">
        <label class="col-form-label col-12 col-md-1" for="txt_pass"> Password: </label>
        <div class="col-12 col-md-4">
          <input class="form-control" type="password" name="txt_pass" id="txt_pass" minlength="6" required />
        </div>
      </div>
      <div class="row mb-2">
        <div class="offset-md-1 col-12 col-md-2 d-grid">
          <button type="submit" class="btn btn-success btn-block"> Login </button>
        </div>
        <div class="col-12 col-md-2 d-grid">
          <button type="reset" class="btn btn-warning btn-block"> Clear </button>
        </div>
      </div>
    </div>  
    <div class="container">
      <div class="row">
        <div class="col-md-6" id="msg-display">


        </div>
      </div>
    </div>
    
  </form>

        <!-- It is a common thing on wep pages to import JS at the bottom of the page. That way your website will "load" its visual elements before it gets "stuck" on the code. -->

        <!-- Other JS scripts also here -->
        <script>
        const params = new URLSearchParams(window.location.search);
        let error = params.get("error");

        if(error === "1"){ //Error code for Incorrect Login/Pass
            //window.alert("Login or Password Incorrect.");
            document.getElementById("msg-display").innerHTML = ` 
                        <div class="alert alert-danger alert-dismissible fade show" role="alert">
            Login or Password Incorrect.
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>            
            `;

        }

        </script>
